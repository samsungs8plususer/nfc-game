<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Catch & Dash</title>
    <style>
        body {
            background: #050510;
            color: #00f2ff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            /* Animated Neon Grid */
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.15) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 8s linear infinite;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 50px 50px; }
        }

        .game-box {
            text-align: center;
            border: 3px solid #00f2ff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 242, 255, 0.4);
            background: rgba(5, 5, 16, 0.85);
            backdrop-filter: blur(8px);
        }

        #p-name { font-size: 1.5rem; color: #ff00ff; text-shadow: 0 0 10px #ff00ff; font-weight: bold; }
        #p-score { font-size: 120px; font-weight: 900; margin: 5px 0; }
        #msg { font-size: 1rem; color: #00ff99; text-transform: uppercase; letter-spacing: 2px; }
        
        .winner-mode {
            border-color: #ff0055 !important;
            color: #ff0055 !important;
            box-shadow: 0 0 50px #ff0055 !important;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .btn-reset {
            margin-top: 25px;
            background: rgba(255, 68, 68, 0.1);
            border: 1px solid #ff4444;
            color: #ff4444;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="game-container" class="game-box">
        <div id="p-name">LOADING...</div>
        <div id="p-score">0</div>
        <div id="msg">POINT ADDED!</div>
        <button class="btn-reset" onclick="resetScore()">Wipe My Score</button>
    </div>

    <script>
        // No "init" function needed - it runs immediately on load!
        
        let user = localStorage.getItem('nfc_user');
        let pts = parseInt(localStorage.getItem('nfc_pts')) || 0;

        // Only prompts for name if it's the very first time
        if (!user) {
            user = prompt("Enter Player Name:");
            if (!user) user = "Player";
            localStorage.setItem('nfc_user', user);
        }

        document.getElementById('p-name').innerText = user.toUpperCase();
        
        // Auto-increment score
        pts++;
        const scoreDisplay = document.getElementById('p-score');
        const container = document.getElementById('game-container');

        if (pts >= 10) {
            scoreDisplay.innerText = "10";
            container.classList.add('winner-mode');
            document.getElementById('p-name').innerText = "YOU WIN!🏆 ";
            document.getElementById('msg').innerText = "GAME COMPLETE";
            localStorage.setItem('nfc_pts', 10);
        } else {
            localStorage.setItem('nfc_pts', pts);
            scoreDisplay.innerText = pts;
        }

        function resetScore() {
            if (confirm("Reset your score to zero? WARNING:WILL RESET YOUR NAME!")) {
                localStorage.clear();
                location.reload();
            }
        }
    </script>
</body>
</html>
